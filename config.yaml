wattnode:
  port: /dev/ttyUSB0
  baud: 19200
  unit_id: 1
  read_interval_sec: 10
  scale_factor: 0.5  # USB WattNode reads 2x actual — root cause TBD

insight:
  host: 192.168.86.86
  read_port: 503
  write_port: 502
  min_gap_ms: 2000
  timeout_ms: 1000
  soc_read_interval_sec: 60
  keepalive_sec: 60

inverters:
  master_unit_id: 11
  slave_unit_ids: [12, 13, 14]
  idle_order: [14, 13, 12, 11]

charge:
  start_hour: 9
  end_hour: 17
  start_per_inverter_w: 600
  max_per_inverter_w: 4000
  max_total_w: 16000
  export_start_w: 1000
  ramp_up_hold_sec: 30
  ramp_down_hold_sec: 300
  dead_band_export_w: 1000
  dead_band_import_w: 2000

discharge:
  per_inverter_w: 600
  max_per_inverter_w: 1000

night_guard:
  leg_export_threshold_w: 50
  resume_allowed: false

safety:
  max_read_failures: 5

startup:
  zero_all_on_start: true

logging:
  level: info
  file: /var/log/solarcontrol.log

telegram:
  bot_token: ""   # set via TELEGRAM_BOT_TOKEN env var
  chat_id: ""     # set via TELEGRAM_CHAT_ID env var
  poll_timeout_sec: 30
  manual_step_w: 300
